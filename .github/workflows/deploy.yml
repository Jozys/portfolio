name: Deployment
on:
  push:
    branches:
      - main
    paths-ignore:
      - ./github
  workflow_dispatch:

concurrency: production

jobs:
  test-build-application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          yarn install
      - name: Build application
        run: |
          yarn build
  deploy:
    runs-on: ubuntu-latest
    needs: test-build-application
    environment: production
    steps:
      - name: Setup ssh
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" > ~/.ssh/known_hosts
      - name: ssh into server
        run: | # ssh into the server and execute build scripts
          ssh -o ServerAliveInterval=600 -t ${{secrets.SSH_USER}}@${{secrets.SSH_HOST}} "./buildPortfolio.sh"
  create-release:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag new version (if changed)
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git tag | grep -q "v$VERSION"; then
            echo "Tag v$VERSION already exists. Skipping."
          else
            git tag v$VERSION
            git push origin v$VERSION
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.tag.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        continue-on-error: true # Ignore if no n
